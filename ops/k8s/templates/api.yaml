{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name | default "jperdior" }}-api
  labels:
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
    spec:
      containers:
        # Single FrankenPHP container — serves HTTP on :80 directly (no nginx sidecar,
        # no FastCGI). The port keeps the name `http` so the Service targetPort + ingress
        # backend selectors stay valid.
        - name: api
          image: {{ include "jperdior.image" (dict "Values" .Values "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - { name: http, containerPort: 80 }
          env:
            {{- include "jperdior.appEnv" . | nindent 12 }}
            # Worker mode — api container ONLY (not the shared appEnv ConfigMap, which
            # worker.yaml also consumes; the messenger worker keeps the default runtime).
            - name: APP_RUNTIME
              value: 'Runtime\FrankenPhpSymfony\Runtime'
            - name: FRANKENPHP_CONFIG
              value: 'worker /app/apps/api/public/index.php'
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
          livenessProbe: {{ toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe: {{ toYaml .Values.api.readinessProbe | nindent 12 }}
          volumeMounts:
            - { name: jwt-keys, mountPath: /var/jwt, readOnly: true }
      volumes:
        {{- include "jperdior.jwtVolume" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app.kubernetes.io/component: api
  ports:
    - { name: http, port: {{ .Values.api.service.port }}, targetPort: http }
{{- end }}
