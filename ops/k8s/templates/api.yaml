{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name | default "jperdior" }}-api
  labels:
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: {{ include "jperdior.image" (dict "Values" .Values "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["php-fpm", "--nodaemonize"]
          ports:
            - { name: fpm, containerPort: 9000 }
          env: {{ include "jperdior.appEnv" . | nindent 12 }}
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - { name: jwt-keys, mountPath: /var/jwt, readOnly: true }
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - { name: http, containerPort: 80 }
          volumeMounts:
            - { name: nginx-conf, mountPath: /etc/nginx/conf.d, readOnly: true }
          livenessProbe: {{ toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe: {{ toYaml .Values.api.readinessProbe | nindent 12 }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ .Release.Name | default "jperdior" }}-nginx
        {{- include "jperdior.jwtVolume" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app.kubernetes.io/component: api
  ports:
    - { name: http, port: {{ .Values.api.service.port }}, targetPort: http }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name | default "jperdior" }}-nginx
data:
  default.conf: |
{{ .Files.Get "../docker/nginx/api.conf" | indent 4 }}
{{- end }}
