{{- if .Values.admin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  labels: { app.kubernetes.io/component: admin }
spec:
  replicas: {{ .Values.admin.replicaCount }}
  selector:
    matchLabels: { app.kubernetes.io/component: admin }
  template:
    metadata:
      labels: { app.kubernetes.io/component: admin }
    spec:
      containers:
        - name: admin
          image: {{ include "jperdior.image" (dict "Values" .Values "image" .Values.admin.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - { name: http, containerPort: 3001 }
          env:
            - { name: NODE_ENV, value: "production" }
            - { name: PORT, value: "3001" }
            - { name: NEXT_PUBLIC_API_URL, value: "https://api.example.com" }
            - { name: INTERNAL_API_URL, value: "http://api" }
          resources: {{ toYaml .Values.admin.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: admin
spec:
  type: {{ .Values.admin.service.type }}
  selector: { app.kubernetes.io/component: admin }
  ports:
    - { name: http, port: {{ .Values.admin.service.port }}, targetPort: http }
{{- end }}
