{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels: { app.kubernetes.io/component: web }
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels: { app.kubernetes.io/component: web }
  template:
    metadata:
      labels: { app.kubernetes.io/component: web }
    spec:
      containers:
        - name: web
          image: {{ include "jperdior.image" (dict "Values" .Values "image" .Values.web.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - { name: NODE_ENV, value: "production" }
            - { name: PORT, value: "3000" }
            - { name: NEXT_PUBLIC_API_URL, value: "https://api.example.com" }
            - { name: INTERNAL_API_URL, value: "http://api" }
          resources: {{ toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: {{ .Values.web.service.type }}
  selector: { app.kubernetes.io/component: web }
  ports:
    - { name: http, port: {{ .Values.web.service.port }}, targetPort: http }
{{- end }}
