; Application-level PHP overrides. Mounted at /usr/local/etc/php/conf.d/zz-app.ini
; so it loads after the upstream defaults.

memory_limit = 512M
post_max_size = 16M
upload_max_filesize = 16M

date.timezone = UTC

; Opcache — production-tuned. Dev compose overlays opcache.validate_timestamps=1 + revalidate_freq=0.
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.preload = /app/apps/api/code/config/preload.php
opcache.preload_user = www-data

; Symfony recommends raising realpath cache for monorepo paths.
realpath_cache_size = 4M
realpath_cache_ttl = 600

; Errors — APP_ENV decides what gets shown.
display_errors = Off
log_errors = On
error_reporting = E_ALL
