[www]
; FPM listens on TCP so the nginx sidecar can reach it. The composed network keeps it private.
listen = 0.0.0.0:9000

; Dynamic process management — fine for dev. Production should tune these to memory budget.
pm = dynamic
pm.max_children = 20
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

; Surface fatal PHP errors in container logs.
catch_workers_output = yes
decorate_workers_output = no
clear_env = no

; Health check endpoint used by docker-compose healthcheck.
ping.path = /ping
pm.status_path = /status
