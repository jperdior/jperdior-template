name: ${COMPOSE_PROJECT_NAME:-jperdior}

# Local development overlays for docker-compose.base.yml. Adds:
#   - Traefik reverse proxy (replaces direct port exposure on nginx/web/admin).
#   - Source mounts so edits are live.
#   - Dev commands (bin/start for api; pnpm dev for web/admin).
#   - Exposed ports for direct DB/Redis access.
#   - JWT key auto-generation on first start (handled by bin/start).
#
# Routes (all on port 80 via Traefik):
#   http://api.localhost     → nginx → php-fpm (Symfony)
#   http://web.localhost     → Next.js web app
#   http://admin.localhost   → Next.js admin app
#   http://localhost:8080    → Traefik dashboard
#
# Used via the Makefile:  make start  ->  docker compose -f base -f dev up -d
#
# Note: uses Compose-spec !reset to neutralize the build:/ports: stanzas inherited
# from the base file (Compose v2.24+ required).

services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "${TRAEFIK_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
    volumes:
      - ./api/php-dev.ini:/usr/local/etc/php/conf.d/zz-dev.ini:ro
      - ../../apps/api:/app/apps/api
      - ../../packages/shared-kernel-php:/app/packages/shared-kernel-php
      - composer_cache:/var/cache/composer
      - api_jwt:/app/apps/api/config/jwt
      - api_vendor:/app/apps/api/vendor
      - api_var:/app/apps/api/var
      - api_bundles:/app/apps/api/public/bundles
    user: "0:0"
    working_dir: /app/apps/api
    command: ["sh", "bin/start"]

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mailpit.localhost`)"
      - "traefik.http.routers.mailpit.entrypoints=web"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"

  rabbitmq:
    profiles: [async]
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  # worker: uncomment together with rabbitmq when async messaging is needed (make start-async)
  # worker:
  #   profiles: [async]
  #   environment:
  #     APP_ENV: dev
  #     APP_DEBUG: "1"
  #   volumes:
  #     - ../../apps/api:/app/apps/api
  #     - ../../packages/shared-kernel-php:/app/packages/shared-kernel-php
  #     - composer_cache:/var/cache/composer
  #     - api_jwt:/app/apps/api/config/jwt
  #     - api_vendor:/app/apps/api/vendor
  #     - api_var:/app/apps/api/var
  #     - api_bundles:/app/apps/api/public/bundles
  #   user: "0:0"
  #   working_dir: /app/apps/api
  #   command:
  #     - sh
  #     - -c
  #     - |
  #       set -e
  #       mkdir -p var/cache var/log
  #       while [ ! -f /app/apps/api/vendor/autoload.php ]; do
  #         sleep 1
  #       done
  #       exec php bin/console messenger:consume async -vv

  nginx:
    ports: !reset []
    volumes:
      - ../../apps/api/public:/app/apps/api/public:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=80"

  web:
    build: !reset
    image: node:22-alpine
    ports: !reset []
    environment:
      NODE_ENV: development
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api.localhost}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://nginx:80}
      CI: "true"
    volumes:
      - ../..:/repo
      - web_node_modules:/repo/node_modules
      - web_next_cache:/repo/apps/web/.next
      - pnpm_store:/repo/.pnpm-store
      - corepack_cache:/root/.cache/node/corepack
      - web_app_node_modules:/repo/apps/web/node_modules
      - api_client_ts_node_modules:/repo/packages/api-client-ts/node_modules
      - ui_react_node_modules:/repo/packages/ui-react/node_modules
    working_dir: /repo
    user: "0:0"
    command:
      - sh
      - -c
      - |
        set -e
        corepack enable
        corepack prepare pnpm@9.15.0 --activate
        pnpm install --filter "@jperdior/web..." --filter "./packages/*"
        exec pnpm -C apps/web dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`web.localhost`) || Host(`localhost`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  admin:
    build: !reset
    image: node:22-alpine
    ports: !reset []
    environment:
      NODE_ENV: development
      PORT: "3001"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api.localhost}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://nginx:80}
      CI: "true"
    volumes:
      - ../..:/repo
      - admin_node_modules:/repo/node_modules
      - admin_next_cache:/repo/apps/admin/.next
      - pnpm_store:/repo/.pnpm-store
      - corepack_cache:/root/.cache/node/corepack
      - admin_app_node_modules:/repo/apps/admin/node_modules
      - api_client_ts_node_modules:/repo/packages/api-client-ts/node_modules
      - ui_react_node_modules:/repo/packages/ui-react/node_modules
    working_dir: /repo
    user: "0:0"
    command:
      - sh
      - -c
      - |
        set -e
        corepack enable
        corepack prepare pnpm@9.15.0 --activate
        pnpm install --filter "@jperdior/admin..."
        exec pnpm -C apps/admin dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.localhost`)"
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.services.admin.loadbalancer.server.port=3001"

volumes:
  composer_cache:
  api_jwt:
  api_vendor:
  api_var:
  api_bundles:
  web_node_modules:
  web_next_cache:
  web_app_node_modules:
  admin_node_modules:
  admin_next_cache:
  admin_app_node_modules:
  api_client_ts_node_modules:
  ui_react_node_modules:
  pnpm_store:
  corepack_cache:
