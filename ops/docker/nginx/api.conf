# Reverse proxy for the Symfony API. Talks fastcgi to `api:9000` over the compose network.

upstream php_upstream {
    server api:9000 max_fails=3 fail_timeout=5s;
}

server {
    listen 80 default_server;
    server_name _;

    root /app/apps/api/public;
    index index.php;

    client_max_body_size 16m;

    # Surface real client IP / proto from the Docker host.
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Symfony front controller — everything routes through index.php.
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Forward original scheme + host so Symfony generates correct URLs behind the proxy.
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;

        fastcgi_buffering off;
        fastcgi_read_timeout 60s;
        internal;
    }

    # Block direct .php access (only index.php allowed).
    location ~ \.php$ {
        return 404;
    }

    # FPM health endpoint (compose healthcheck targets this).
    location = /__fpm_ping {
        access_log off;
        allow 127.0.0.1;
        deny all;
        fastcgi_pass php_upstream;
        fastcgi_param SCRIPT_FILENAME /ping;
        include fastcgi_params;
    }

    access_log /var/log/nginx/api.access.log;
    error_log  /var/log/nginx/api.error.log notice;
}
