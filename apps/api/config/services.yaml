imports:
    - { resource: '../src/Shared/Infrastructure/Symfony/Resources/config/services.yaml' }
    - { resource: '../src/User/Infrastructure/Symfony/Resources/config/services.yaml' }

parameters:
    app.frontend_url: '%env(APP_FRONTEND_URL)%'
    app.mailer_from: '%env(MAILER_FROM)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        Jperdior\SharedKernel\Domain\Bus\Command\CommandHandler:
            tags:
                - { name: messenger.message_handler, bus: messenger.bus.command }
        Jperdior\SharedKernel\Domain\Bus\Query\QueryHandler:
            tags:
                - { name: messenger.message_handler, bus: messenger.bus.query }
        Jperdior\SharedKernel\Domain\Bus\Event\DomainEventSubscriber:
            tags:
                - { name: messenger.message_handler, bus: messenger.bus.event }
        App\Shared\Presentation\Http\ExceptionStatusMapProvider:
            tags: [ 'app.exception_status_map' ]

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/**/{Domain,Application}/**/*Command.php'
            - '../src/**/{Domain,Application}/**/*Query.php'
            - '../src/**/{Domain,Application}/**/*Event.php'
            # Bus adapters have explicit $bus arguments defined in the shared services.yaml.
            # Excluding them prevents App\ scan from re-registering with default autowiring.
            - '../src/Shared/Infrastructure/Bus/'

    # Override the default autowired definition created by the App\ scan above
    # with explicit string arguments. Must come AFTER the App\ block.
    App\User\Infrastructure\Mail\SymfonyPasswordRecoveryEmailSender:
        arguments:
            $frontendUrl: '%app.frontend_url%'
            $fromAddress: '%app.mailer_from%'

