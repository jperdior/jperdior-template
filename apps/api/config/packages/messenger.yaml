framework:
    messenger:
        default_bus: messenger.bus.default
        buses:
            messenger.bus.default:
                middleware:
                    - doctrine_ping_connection
                    - doctrine_close_connection
            messenger.bus.command: ~
            messenger.bus.query: ~
            messenger.bus.event: ~

        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 30000
            failed: '%env(MESSENGER_FAILED_TRANSPORT_DSN)%'

        # Async routing per command goes here as contexts grow:
        # routing:
        #     App\<Context>\Application\Command\<Verb>\<Verb>Command: async
