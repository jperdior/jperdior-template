framework:
    messenger:
        default_bus: messenger.bus.command
        buses:
            messenger.bus.command: ~
            messenger.bus.query: ~
            messenger.bus.event:
                default_middleware:
                    enabled: true
                    allow_no_handlers: true

        # All buses run synchronously by default (no worker required).
        #
        # To enable async processing with RabbitMQ:
        #  1. Set MESSENGER_TRANSPORT_DSN in .env.local (see .env.dist for the example value).
        #  2. Run `make start-async` to start the rabbitmq broker and the worker container.
        #  3. Route the commands/events you want processed asynchronously in the routing block.
        #
        # transports:
        #     async:
        #         dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
        #         retry_strategy:
        #             max_retries: 3
        #             delay: 1000
        #             multiplier: 2
        #             max_delay: 30000
        #     failed:
        #         dsn: '%env(MESSENGER_FAILED_TRANSPORT_DSN)%'
        # failure_transport: failed
        #
        # routing:
        #     App\<Context>\Application\<Verb>\<Verb>Command: async
