security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: auto

    providers:
        app_user_provider:
            id: App\User\Infrastructure\Symfony\Security\UserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        doc:
            pattern: ^/api/doc
            security: false

        signup:
            pattern: ^/auth/signup
            stateless: true
            security: false

        forgot_password:
            pattern: ^/auth/forgot-password$
            stateless: true
            security: false

        reset_password:
            pattern: ^/auth/reset-password$
            stateless: true
            security: false

        login:
            pattern: ^/auth/login$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        refresh:
            pattern: ^/auth/refresh$
            stateless: true
            refresh_jwt:
                check_path: /auth/refresh

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
            entry_point: jwt

    access_control:
        - { path: ^/auth/(login|signup|refresh|forgot-password|reset-password), roles: PUBLIC_ACCESS }
        - { path: ^/api/doc,                     roles: PUBLIC_ACCESS }
        - { path: ^/api/admin,                   roles: ROLE_ADMIN }
        - { path: ^/api,                         roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
