nelmio_api_doc:
    documentation:
        info:
            title: 'jperdior-template API'
            description: 'API generated from controllers in apps/api/code/src/*/Presentation/Http.'
            version: '0.1.0'
        components:
            securitySchemes:
                bearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - bearerAuth: []
    areas:
        default:
            path_patterns:
                - ^/api
                - ^/auth
