name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found. Run /auto-update-changelog ${version} before tagging."
            exit 1
          fi
          notes=$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "::error::No section '## [${version}]' found in CHANGELOG.md. Run /auto-update-changelog ${version} before tagging."
            exit 1
          fi
          {
            echo "content<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
